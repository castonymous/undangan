<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Katalog Undangan</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    /* ── AUTH GATE ── */
    #auth-gate {
      position: fixed;
      inset: 0;
      background: var(--charcoal);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
    }

    #auth-gate.hidden { display: none; }

    .auth-box {
      background: #232323;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2.5rem 2.25rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

    .auth-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--gold);
      display: block;
      margin-bottom: 0.2rem;
    }

    .auth-logo span { color: white; font-style: italic; }

    .auth-subtitle {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 2rem;
    }

    .auth-icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }

    .auth-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.4);
      text-align: left;
      margin-bottom: 0.5rem;
    }

    .auth-input {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      letter-spacing: 0.1em;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 1.25rem;
      text-align: center;
    }

    .auth-input:focus { border-color: var(--gold); background: rgba(255,255,255,0.09); }

    .auth-input.shake {
      animation: shake 0.42s ease;
      border-color: var(--danger) !important;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-8px); }
      40%,80% { transform: translateX(8px); }
    }

    .auth-btn {
      width: 100%;
      padding: 0.85rem;
      border-radius: 10px;
      border: none;
      background: var(--gold);
      color: var(--charcoal);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s, opacity 0.2s;
    }

    .auth-btn:hover:not(:disabled) { background: var(--gold-light); }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-error {
      font-size: 0.8rem;
      color: #e05252;
      margin-top: 0.75rem;
      min-height: 1.2em;
    }

    .auth-attempts {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.25);
      margin-top: 0.4rem;
      min-height: 1em;
    }
  </style>
</head>
<body>

<!-- ══ AUTH GATE ══ -->
<div id="auth-gate">
  <div class="auth-box">
    <span class="auth-logo">Undangan<span>.id</span></span>
    <div class="auth-subtitle">Dashboard Admin</div>
    <span class="auth-icon">🔐</span>
    <label class="auth-label" for="auth-password">Password Admin</label>
    <input
      type="password"
      id="auth-password"
      class="auth-input"
      placeholder="••••••••"
      autocomplete="current-password"
      maxlength="64"
    >
    <button class="auth-btn" id="auth-submit">Masuk Dashboard</button>
    <div class="auth-error" id="auth-error"></div>
    <div class="auth-attempts" id="auth-attempts"></div>
  </div>
</div>

<!-- ══ DASHBOARD (hidden until auth) ══ -->
<div class="dash-layout" id="dash-layout" style="display:none">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">Undangan<span>.id</span></span>
      <span class="sidebar-label">Dashboard Admin</span>
    </div>

    <div class="sidebar-section-label">Produk</div>
    <div class="sidebar-tree" id="sidebar-tree">
      <!-- Rendered by dashboard.js -->
    </div>

    <div class="sidebar-actions">
      <button class="sidebar-btn btn-gold" onclick="Dashboard.addRootProduct()">
        ＋ Produk Baru
      </button>
      <button class="sidebar-btn btn-outline" onclick="Dashboard.renderSettings()">
        ⚙️ Pengaturan
      </button>
      <a href="index.html" target="_blank" class="sidebar-btn btn-outline">
        👁️ Lihat Katalog
      </a>
      <button class="sidebar-btn btn-outline" onclick="Dashboard.exportData()">
        ⬇️ Export JSON
      </button>
      <button class="sidebar-btn btn-danger" onclick="Auth.logout()">
        🚪 Keluar
      </button>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <div class="main-content">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-title">✏️ Editor Produk</div>
      <div class="topbar-actions">
        <button class="btn btn-secondary" id="btn-settings">⚙️ Pengaturan</button>
        <button class="btn btn-secondary" id="btn-preview">👁️ Preview</button>
        <button class="btn btn-primary" id="btn-add-root">＋ Produk Baru</button>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content-area" id="content-area">
      <!-- Rendered by dashboard.js -->
    </div>

  </div>

</div>

<!-- ══ MODAL ══ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Konfirmasi</h3>
    <p id="modal-body"></p>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modal-cancel">Batal</button>
      <button class="btn" style="background:var(--danger);color:white" id="modal-confirm">Ya, Lanjutkan</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<!-- auth.js harus dimuat sebelum dashboard.js -->
<script src="auth.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
